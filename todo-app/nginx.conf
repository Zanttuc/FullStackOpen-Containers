# Global events block
events { }

http {
  server {
    listen 80;

    # Root: serve the static frontend from the frontend container
    location / {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';

      # Forward to the frontend container's nginx (built image exposes port 80)
      proxy_pass http://app:80/;
    }

    # API: proxy to backend and strip /api/ prefix
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';

      # Trailing slash ensures the /api/ prefix is removed when passing
      proxy_pass http://backend:3000/;
    }
  }
}
